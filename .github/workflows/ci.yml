name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build-and-lint:
    name: Install · Lint · Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  seed-check:
    name: Seed file not empty
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check seed.ts is not empty
        run: |
          SEED_FILE="apps/backend/src/db/seed.ts"
          if [ ! -s "$SEED_FILE" ]; then
            echo "ERROR: $SEED_FILE is empty or does not exist."
            exit 1
          fi
          LINE_COUNT=$(wc -l < "$SEED_FILE")
          if [ "$LINE_COUNT" -lt 5 ]; then
            echo "ERROR: $SEED_FILE has only $LINE_COUNT line(s) – it appears to be a placeholder."
            exit 1
          fi
          echo "OK: $SEED_FILE has $LINE_COUNT lines."
