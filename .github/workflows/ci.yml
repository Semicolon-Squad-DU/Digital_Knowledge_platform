name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  block-bot-commits:
    name: Block automated bot commits
    runs-on: ubuntu-latest
    steps:
      - name: Reject commits from copilot-swe-agent or other bots
        run: |
          ACTOR="${{ github.actor }}"
          echo "Triggered by: $ACTOR"
          if [[ "$ACTOR" == *"[bot]"* ]] || [[ "$ACTOR" == "copilot-swe-agent" ]]; then
            echo "❌ ERROR: Automated bot '$ACTOR' is not allowed to push to this repository."
            echo "This is an assessed academic project. All commits must be made by human team members."
            exit 1
          fi
          echo "✅ Human actor confirmed: $ACTOR"

  backend:
    needs: block-bot-commits
    name: Backend — lint & build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run -w @dkp/backend lint

      - name: Test
        run: npm run -w @dkp/backend test

      - name: Build
        run: npm run -w @dkp/backend build

      - name: Check seed file is not empty
        run: |
          if [ ! -s apps/backend/src/core/db/seed.ts ]; then
            echo "ERROR: seed.ts is empty!"
            exit 1
          fi
          echo "seed.ts OK ($(wc -l < apps/backend/src/core/db/seed.ts) lines)"

  frontend:
    needs: block-bot-commits
    name: Frontend — lint & build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run -w @dkp/frontend lint

      - name: Test
        run: npm run -w @dkp/frontend test

      - name: Build
        run: npm run -w @dkp/frontend build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4000/api
