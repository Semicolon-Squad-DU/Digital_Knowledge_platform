# Production-style stack: backing services (from docker-compose.yml) plus the
# app containers themselves, all wired by env vars instead of hardcoded values.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up --build -d
#
# Override any of the variables below via a root-level .env file or your
# orchestrator's secret/config injection — none of them are required to match
# the values in docker-compose.yml, which exist only for plain local dev.

services:
  postgres:
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dkp_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dkp_password}
      POSTGRES_DB: ${POSTGRES_DB:-dkp_db}

  minio:
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-dkp_minio_user}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-dkp_minio_password}

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: dkp_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4000
      API_URL: ${API_URL:-http://localhost:4000}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      DATABASE_URL: ${DATABASE_URL:-postgresql://${POSTGRES_USER:-dkp_user}:${POSTGRES_PASSWORD:-dkp_password}@postgres:5432/${POSTGRES_DB:-dkp_db}}
      JWT_SECRET: ${JWT_SECRET}
      REDIS_URL: redis://redis:6379
      ELASTICSEARCH_URL: http://elasticsearch:9200
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-dkp_minio_user}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-dkp_minio_password}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME:-dkp-files}
      S3_FORCE_PATH_STYLE: "true"
      SMTP_HOST: mailhog
      SMTP_PORT: 1025
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    container_name: dkp_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000/api}
    ports:
      - "3000:3000"
